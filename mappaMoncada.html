    <div id="info-pannello">
        <h2 id="titolo-stanza">Seleziona una stanza</h2>
        <p id="info-stanza">Clicca sulla mappa per ascoltare la descrizione.</p>
        <div id="player-wrapper"></div>
    </div>
</div>

<script>
    const descrizioni = {
        "stanza_mattonelle_sx": "Le antiche mattonelle del piano terra.",
        "lapidarium": "Collezione di reperti epigrafici e lapidei.",
        "ghigliottina": "Area dedicata alla giustizia storica.",
        "corridoio_centrale": "Il passaggio principale del museo.",
        "bookshop": "Qui puoi acquistare souvenir e libri.",
        "ingresso": "Benvenuti al museo.",
        "stanza_2_dx": "Esposizione temporanea lato destro."
    };

    document.addEventListener("DOMContentLoaded", () => {
        const container = document.getElementById('main-container');
        const titoloUI = document.getElementById('titolo-stanza');
        const infoUI = document.getElementById('info-stanza');
        const wrapper = document.getElementById('player-wrapper');

        container.addEventListener('click', (e) => {
            const stanzaGroup = e.target.closest('.stanza');
            if (!stanzaGroup) return;

            const id = stanzaGroup.id;
            const nomeDisplay = id.replace(/_/g, ' ');

            // Visual update
            document.querySelectorAll('.stanza').forEach(s => s.classList.remove('stanza-attiva'));
            stanzaGroup.classList.add('stanza-attiva');

            titoloUI.innerText = nomeDisplay;
            infoUI.innerText = descrizioni[id] || "Descrizione non disponibile.";

            // Audio Player update
            wrapper.innerHTML = `
                <div class="player-container">
                    <p style="font-size: 0.8em; margin-bottom: 5px;">▶ Riproduzione audio...</p>
                    <audio controls autoplay style="width: 100%;">
                        <source src="audio/${id}.mp3" type="audio/mpeg">
                    </audio>
                </div>
            `;

            const audioEvt = wrapper.querySelector('audio');
            audioEvt.onended = () => {
                stanzaGroup.classList.remove('stanza-attiva');
            };
        });
    });
</script>

</body>
</html>
